<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VidGrabber - Download Video HD Tanpa Batas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0a0a0a; color: #fff; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .gradient-text { background: linear-gradient(90deg, #f87171, #f43f5e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">

    <div class="hidden"><h1>Vidoy Video Downloader Free HD</h1></div>

    <div class="w-full max-w-3xl text-center space-y-8">
        <div class="space-y-2">
            <h2 class="text-5xl font-black tracking-tighter uppercase">VID<span class="gradient-text">GRABBER</span></h2>
            <p class="text-zinc-500 text-sm italic font-medium tracking-widest uppercase">The Ultimate Fast Downloader</p>
        </div>

        <div class="glass p-2 rounded-3xl flex flex-col md:flex-row gap-2 shadow-2xl">
            <input type="text" id="vidUrl" placeholder="Tempel link Vidoy di sini..." 
                   class="flex-1 bg-transparent border-none px-6 py-4 text-white focus:outline-none placeholder:text-zinc-600">
            <button onclick="grabVideo()" id="btnGrab" 
                    class="bg-red-600 hover:bg-red-700 text-white font-bold px-10 py-4 rounded-2xl transition duration-300 shadow-lg shadow-red-600/20 active:scale-95 uppercase text-sm tracking-widest">
                UNDUH SEKARANG
            </button>
        </div>

        <div id="result" class="hidden glass p-8 rounded-3xl animate-in fade-in slide-in-from-bottom-4 duration-500">
            <div class="flex flex-col items-center space-y-4">
                <div class="w-16 h-16 bg-green-500/10 rounded-full flex items-center justify-center">
                    <svg class="w-8 h-8 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                </div>
                <h3 class="text-xl font-bold">Video Berhasil Ditemukan!</h3>
                <p id="videoTitle" class="text-zinc-400 text-sm italic"></p>
                <div class="flex gap-4 w-full">
                    <a id="downloadLink" href="#" target="_blank" 
                       class="flex-1 bg-white text-black font-black py-4 rounded-2xl hover:bg-zinc-200 transition text-center uppercase text-sm">
                        DOWNLOAD FILE (.MP4)
                    </a>
                </div>
                <p class="text-[10px] text-zinc-600 uppercase font-bold tracking-widest">Tersimpan secara aman di server privat</p>
            </div>
        </div>

        <div id="loader" class="hidden flex flex-col items-center space-y-4">
            <div class="w-10 h-10 border-4 border-red-600 border-t-transparent rounded-full animate-spin"></div>
            <p class="text-xs text-zinc-500 font-mono animate-pulse uppercase tracking-widest">Mengekstrak data dari Vidoy...</p>
        </div>
    </div>

    <footer class="mt-20 text-zinc-700 text-[10px] font-bold tracking-widest uppercase flex flex-col items-center gap-4">
        <p>© 2026 VaultGroup Systems - Secure Downloader Node</p>
        <div class="flex gap-6 opacity-50">
            <a href="#" class="hover:text-red-500 transition">Terms</a>
            <a href="#" class="hover:text-red-500 transition">API Access</a>
            <a href="#" class="hover:text-red-500 transition">Contact</a>
        </div>
    </footer>

    <script>
        async function grabVideo() {
            const url = document.getElementById('vidUrl').value;
            const btn = document.getElementById('btnGrab');
            const loader = document.getElementById('loader');
            const result = document.getElementById('result');

            if (!url) return alert("Tempel dulu link-nya!");

            // UI Feedback
            btn.disabled = true;
            btn.classList.add('opacity-50');
            loader.classList.remove('hidden');
            result.classList.add('hidden');

            try {
                // PANGGIL API SERVERLESS KITA
                const response = await fetch(`/api/grab?url=${encodeURIComponent(url)}`);
                const data = await response.json();

                if (data.success) {
                    document.getElementById('videoTitle').innerText = url;
                    document.getElementById('downloadLink').href = data.downloadUrl;
                    result.classList.remove('hidden');
                } else {
                    alert("Error: " + data.error);
                }
            } catch (err) {
                alert("Gagal menghubungi server grabber.");
            } finally {
                btn.disabled = false;
                btn.classList.remove('opacity-50');
                loader.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
